<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150" fill="none">
  <!-- Background -->
  <rect width="240" height="150" fill="#f5f1eb"/>
  <!-- Hatch pattern fill -->
  <rect width="240" height="150" fill="url(#hatch)" opacity="0.5"/>
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#ddd7cc" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Center beam / fulcrum post -->
  <line x1="120" y1="32" x2="120" y2="110" stroke="#1f5fae" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Fulcrum base -->
  <line x1="104" y1="110" x2="136" y2="110" stroke="#1f5fae" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Crossbar -->
  <line x1="64" y1="46" x2="176" y2="46" stroke="#1f5fae" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Pivot dot -->
  <circle cx="120" cy="46" r="3" fill="#1f5fae" fill-opacity="0.7"/>

  <!-- Left scale chain -->
  <line x1="80" y1="46" x2="80" y2="62" stroke="#1f5fae" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Left scale pan -->
  <path d="M64 62 Q80 68 96 62" stroke="#1f5fae" stroke-width="1.4" stroke-opacity="0.65" stroke-linecap="round"/>

  <!-- Right scale chain -->
  <line x1="160" y1="46" x2="160" y2="70" stroke="#1f5fae" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Right scale pan (lower — weighted) -->
  <path d="M144 70 Q160 76 176 70" stroke="#1f5fae" stroke-width="1.4" stroke-opacity="0.65" stroke-linecap="round"/>

  <!-- Circuit / AI node decoration — left side -->
  <circle cx="72" cy="88" r="3.5" fill="none" stroke="#1f5fae" stroke-width="1" stroke-opacity="0.45"/>
  <circle cx="72" cy="88" r="1.2" fill="#1f5fae" fill-opacity="0.4"/>
  <line x1="72" y1="84" x2="72" y2="78" stroke="#1f5fae" stroke-width="0.8" stroke-opacity="0.35"/>
  <line x1="68" y1="88" x2="60" y2="88" stroke="#1f5fae" stroke-width="0.8" stroke-opacity="0.35"/>
  <line x1="76" y1="88" x2="84" y2="88" stroke="#1f5fae" stroke-width="0.8" stroke-opacity="0.35"/>
  <circle cx="60" cy="88" r="2" fill="none" stroke="#1f5fae" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Circuit / AI node decoration — right side -->
  <circle cx="168" cy="92" r="3.5" fill="none" stroke="#1f5fae" stroke-width="1" stroke-opacity="0.45"/>
  <circle cx="168" cy="92" r="1.2" fill="#1f5fae" fill-opacity="0.4"/>
  <line x1="168" y1="88" x2="168" y2="82" stroke="#1f5fae" stroke-width="0.8" stroke-opacity="0.35"/>
  <line x1="172" y1="92" x2="180" y2="92" stroke="#1f5fae" stroke-width="0.8" stroke-opacity="0.35"/>
  <line x1="164" y1="92" x2="156" y2="92" stroke="#1f5fae" stroke-width="0.8" stroke-opacity="0.35"/>
  <circle cx="180" cy="92" r="2" fill="none" stroke="#1f5fae" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Small document lines below — suggestion of text/citation -->
  <line x1="100" y1="122" x2="140" y2="122" stroke="#c8c0b0" stroke-width="1.2"/>
  <line x1="105" y1="128" x2="135" y2="128" stroke="#c8c0b0" stroke-width="1.2"/>
  <line x1="108" y1="134" x2="132" y2="134" stroke="#c8c0b0" stroke-width="1.2"/>
</svg>
