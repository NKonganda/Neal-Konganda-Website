    <circle cx="40" cy="38" r="3" fill="#1f5fae" opacity="0.8"/>
    <circle cx="40" cy="56" r="3" fill="#1f5fae" opacity="0.8"/>
    <circle cx="40" cy="70" r="3" fill="#1f5fae" opacity="0.8"/>
    <circle cx="58" cy="30" r="3" fill="#1f5fae" opacity="0.7"/>
    <circle cx="58" cy="47" r="3" fill="#1f5fae" opacity="0.7"/>
    <circle cx="58" cy="64" r="3" fill="#1f5fae" opacity="0.7"/>
    <circle cx="72" cy="21" r="3" fill="#1f5fae" opacity="0.6"/>
    <circle cx="72" cy="47" r="3" fill="#1f5fae" opacity="0.6"/>
    <circle cx="72" cy="73" r="3" fill="#1f5fae" opacity="0.6"/>
